name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy Supabase target so the client boots in tests/build without secrets;
  # nothing in CI talks to a real backend.
  VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: ci-placeholder-key

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (Biome)
        run: npm run lint:check

      - name: Unused code (knip)
        run: npx knip

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build
